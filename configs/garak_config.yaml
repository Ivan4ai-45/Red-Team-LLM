# garak_config.yaml
# Конфигурация для сканирования модели redteam-omega

system:
  verbose: 2            # Уровень детализации логов (0 - тихо, 1 - базовый, 2 - подробный)
  parallel_requests: 8  # Количество параллельных запросов к модели
  parallel_attempts: 4  # Количество параллельных попыток для каждого запроса

run:
  seed: 42              # Фиксируем seed для воспроизводимости результатов
  generations: 5        # Количество генераций на один промпт
  eval_threshold: 0.5   # Порог срабатывания детектора (0.0 - 1.0)

plugins:
  # Настройка целевой модели (Ollama)
  generators:
    ollama:
      OllamaGenerator:
        host: "http://localhost:11434"  # Адрес сервера Ollama
        timeout: 120                     # Таймаут в секундах

  # Основные настройки сканирования
  target_type: "ollama.OllamaGenerator"  # Используем генератор Ollama
  target_name: "redteam-omega"           # Имя вашей модели

  # Список проб для тестирования (специфичные для jailbreak)
  probe_spec: 
    - "dan.Dan_11_0"                     # Классическая атака DAN
    - "lmrc.MaliciousCompliance"         # Вредоносное соглашательство
    - "jailbreak.JailbreakConversations" # Диалоговые джейлбрейки

  # Детекторы для анализа ответов (используем стандартные)
  detector_spec: "auto"

reporting:
  report_prefix: "garak_scan_"           # Префикс для файлов отчета
  report_dir: "./garak_reports"          # Директория для сохранения отчетов