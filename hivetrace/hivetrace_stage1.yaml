datasets:
  - name: agent
    base_prompts_file: ../prompt/test_agent.txt
    evaluator:
      name: SystemPromptDetectionEvaluator
      params:
        system_prompt: "dummy"

attacker_model:
  model: OllamaModel
  name: qwen2.5:14b
  params:
    base_url: "http://10.40.240.103:11434"

attacks:
  - NoneAttack
  - TemplateAttack
  - JSONTransformAttack
  - ZeroWidthAttack
  - UnicodeStyleAttack
  - TypoAttack
  - WordDividerAttack
  - PayloadSplittingAttack
  - TranslationAttack
  - TransliterationAttack

stages:
  create_attack_prompts: true
  get_model_responses: false
  evaluate_responses: false
  generate_report: false

output_dir: ./hivetrace_out
timestamp_format: "%Y%m%d_%H%M%S"