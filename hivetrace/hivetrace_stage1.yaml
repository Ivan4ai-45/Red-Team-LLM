datasets:
  - name: harmful
    base_prompts_file: ../prompt/harmful.txt
    evaluator:
      name: SystemPromptDetectionEvaluator
      params:
        system_prompt: "dummy"

attacker_model:
  model: OllamaModel
  name: qwen2.5-abliterate:14b_sys
  params:
    base_url: "http://10.40.240.103:11434"

attacks:
  - UnsafeWordVariableFullAttack
  - DANAttack
  - NoneAttack
  - HexEncodingAttack
  - BinaryEncodingAttack
  - RotCipherAttack
  - AtbashCipherAttack
  - UnicodeRussianStyleAttack
  - LeetspeakAttack
  - TypoAttack
  - HtmlEntityAttack
  - ZeroWidthAttack
  - TranslationAttack
  - JSONTransformAttack
  - PrefixInjectionAttack
  - PastTenseAttack
  - LanguageOutputAttack

stages:
  create_attack_prompts: true
  get_model_responses: false
  evaluate_responses: false
  generate_report: false

output_dir: ./hivetrace_out
timestamp_format: "%Y%m%d_%H%M%S"